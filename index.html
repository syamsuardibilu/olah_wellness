<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Olah Data Wellness</title>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      padding: 15px;
      margin: 0;
    }

    .container {
      background: white;
      padding: 15px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.08);
      max-width: 1200px;
      margin: 0 auto;
    }

    h2 {
      margin-top: 0;
      color: #1f2d3d;
    }

    input[type="file"] {
      margin-top: 10px;
      margin-bottom: 10px;
    }

    .search {
      margin-top: 10px;
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
      box-sizing: border-box;
    }

    .summary {
      margin-top: 12px;
      margin-bottom: 12px;
      font-weight: bold;
      color: #2c3e50;
      line-height: 1.6;
    }

    .table-wrap {
      overflow-x: auto;
      margin-top: 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      background: white;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 8px;
      text-align: left;
      vertical-align: top;
      white-space: nowrap;
    }

    th {
      background: #e9eef5;
      position: sticky;
      top: 0;
    }

    tr:nth-child(even) {
      background: #f8fbff;
    }

    .note {
      font-size: 12px;
      color: #666;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Upload Excel Wellness</h2>

    <input type="file" id="file" accept=".xlsx,.xls" />

    <input
      type="text"
      id="search"
      class="search"
      placeholder="Cari nama, unit, email, atau data lain..."
    />

    <div class="summary" id="info"></div>
    <div class="note">
      Data otomatis dibersihkan dari duplikat berdasarkan kolom nama.
    </div>

    <div class="table-wrap">
      <div id="table"></div>
    </div>
  </div>

  <script>
    let globalData = [];
    let originalCount = 0;
    let uniqueCount = 0;
    let nameColumnUsed = "";

    document.getElementById("file").addEventListener("change", function (e) {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();

      reader.onload = function (event) {
        const data = new Uint8Array(event.target.result);
        const workbook = XLSX.read(data, { type: "array" });

        const sheetName = workbook.SheetNames[0];
        const worksheet = workbook.Sheets[sheetName];
        const json = XLSX.utils.sheet_to_json(worksheet, { defval: "" });

        originalCount = json.length;

        const detectedNameColumn = detectNameColumn(json);
        nameColumnUsed = detectedNameColumn || "";

        globalData = removeDuplicatesByName(json, detectedNameColumn);
        uniqueCount = globalData.length;

        updateInfo(sheetName, globalData.length);
        renderTable(globalData);
      };

      reader.readAsArrayBuffer(file);
    });

    document.getElementById("search").addEventListener("keyup", function () {
      const keyword = this.value.toLowerCase().trim();

      const filtered = globalData.filter(row =>
        Object.values(row).some(val =>
          String(val).toLowerCase().includes(keyword)
        )
      );

      updateFilteredInfo(filtered.length);
      renderTable(filtered);
    });

    function detectNameColumn(data) {
      if (!data || data.length === 0) return null;

      const headers = Object.keys(data[0]);

      const priorityColumns = [
        "Personnel Number",
        "Nama",
        "Nama Pegawai",
        "Full Name",
        "Employee Name",
        "Name"
      ];

      for (const col of priorityColumns) {
        if (headers.includes(col)) return col;
      }

      return headers[0] || null;
    }

    function removeDuplicatesByName(data, nameColumn) {
      if (!nameColumn) return data;

      const seen = new Set();
      const result = [];

      for (const row of data) {
        const rawName = row[nameColumn];
        const cleanName = String(rawName || "").trim().toLowerCase();

        if (!cleanName) continue;

        if (!seen.has(cleanName)) {
          seen.add(cleanName);
          result.push(row);
        }
      }

      return result;
    }

    function updateInfo(sheetName, currentCount) {
      const info = document.getElementById("info");
      info.innerHTML =
        "Sheet: " + sheetName + "<br>" +
        "Jumlah data awal: " + originalCount + "<br>" +
        "Jumlah data setelah hapus duplikat: " + uniqueCount + "<br>" +
        "Kolom nama yang dipakai: " + (nameColumnUsed || "-") + "<br>" +
        "Jumlah data yang sedang tampil: " + currentCount;
    }

    function updateFilteredInfo(currentCount) {
      const info = document.getElementById("info");
      info.innerHTML =
        "Jumlah data awal: " + originalCount + "<br>" +
        "Jumlah data setelah hapus duplikat: " + uniqueCount + "<br>" +
        "Kolom nama yang dipakai: " + (nameColumnUsed || "-") + "<br>" +
        "Jumlah data yang sedang tampil: " + currentCount;
    }

    function renderTable(data) {
      const tableDiv = document.getElementById("table");

      if (!data || data.length === 0) {
        tableDiv.innerHTML = "<p>Tidak ada data yang tampil.</p>";
        return;
      }

      const headers = Object.keys(data[0]);

      let html = "<table>";
      html += "<thead><tr>";

      headers.forEach(header => {
        html += "<th>" + escapeHtml(header) + "</th>";
      });

      html += "</tr></thead><tbody>";

      data.forEach(row => {
        html += "<tr>";
        headers.forEach(header => {
          html += "<td>" + escapeHtml(row[header]) + "</td>";
        });
        html += "</tr>";
      });

      html += "</tbody></table>";

      tableDiv.innerHTML = html;
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }
  </script>
</body>
</html>
